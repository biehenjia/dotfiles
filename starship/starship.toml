"$schema" = 'https://starship.rs/config-schema.json'

# Pastel "earthy tree" palette (soft bark + sage + moss)
# light -> deeper earthy accents:
# #fbf7f0  (base cream)
# #f1e9dc  (overlay sand)
# #e7e1d5  (mushroom)
# #cfe1d6  (pale sage)
# #a9c6b2  (sage)
# #6e9c7a  (moss)
# #3f6b4f  (pine)
# #3a3f35  (deep bark text)

format = """
[вЦСвЦТвЦУ](#a9c6b2)\
[ оЬС ](bg:#e7e1d5 fg:#3a3f35)\
[оВі](bg:#a9c6b2 fg:#e7e1d5)\
$directory\
[оВі](fg:#a9c6b2 bg:#6e9c7a)\
$git_branch\
$git_status\
[оВі](fg:#6e9c7a bg:#3f6b4f)\
$nodejs\
$rust\
$golang\
$php\
[оВі](fg:#3f6b4f bg:#f1e9dc)\
$time\
[оВі ](fg:#f1e9dc)\
\n$character"""


[directory]
style = "fg:#3a3f35 bg:#a9c6b2"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вА¶/"

[directory.substitutions]
"Documents" = "у∞ИЩ "
"Downloads" = "пАЩ "
"Music" = "пАБ "
"Pictures" = "пАЊ "

[git_branch]
symbol = "пРШ"
style = "bg:#6e9c7a"
format = '[[ $symbol $branch ](fg:#fbf7f0 bg:#6e9c7a)]($style)'

[git_status]
style = "bg:#6e9c7a"
format = '[[($all_status$ahead_behind )](fg:#fbf7f0 bg:#6e9c7a)]($style)'

[nodejs]
symbol = "оЬШ"
style = "bg:#3f6b4f"
format = '[[ $symbol ($version) ](fg:#fbf7f0 bg:#3f6b4f)]($style)'

[rust]
symbol = "оЮ®"
style = "bg:#3f6b4f"
format = '[[ $symbol ($version) ](fg:#fbf7f0 bg:#3f6b4f)]($style)'

[golang]
symbol = "оШІ"
style = "bg:#3f6b4f"
format = '[[ $symbol ($version) ](fg:#fbf7f0 bg:#3f6b4f)]($style)'

[php]
symbol = "оШИ"
style = "bg:#3f6b4f"
format = '[[ $symbol ($version) ](fg:#fbf7f0 bg:#3f6b4f)]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#f1e9dc"
format = '[[ пРЇ $time ](fg:#3f6b4f bg:#f1e9dc)]($style)'
